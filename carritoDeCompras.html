<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="modalCarritoDeCompras" class="hidden">
      <!-- Barra navegacion carrito de compras -->
      <div id="navCatalogo" class="center">
        <nav id="navBarCatalogo" class="center">
          <a href="/"
            ><img src="./img/logo.png" alt="" id="logoNavBarCatalogo"
          /></a>
          <ul id="linksNavBarCatalogo" class="center">
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Catalogo</a></li>
            <li class="hidden"><a href="#">Filtros</a></li>
          </ul>
        </nav>
      </div>
      <!-- Fin barra navegacion carrito de compras -->
      <div id="contenedorCarritoDeCompras">
        <div id="contenedorArticulosEnCarrito">
          <!-- Ejemplo tarjeta en carrito -->
          <div class="cartaProductoEnCarrito">
            <div class="contenedorImagenCarrito">
              <img
                src="/img/productos/audifonosInalambricos.jpg"
                alt=""
                class=""
              />
            </div>
            <div class="informacionDeProducto">
              <h1>Este es el nombre del articulo</h1>
              <p>Esta es la descripcion del articulo</p>
              <p>Precio: Q.<span>0</span></p>
              <p>cantidad: X</p>
            </div>
          </div>
          <!-- Ejemplo tarjeta en carrito -->
        </div>
        <div id="contenedorResumen">
          <h1>Resumen</h1>
          <p>
            Total de articulos: Q.<span class="carritoTotalArticulos">0</span>
          </p>
          <p>Envio: Gratis</p>
          <button>Confirmar compra</button>
        </div>
      </div>
    </div>
  </body>
</html>
